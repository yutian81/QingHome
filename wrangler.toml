name = "qinghome"
main = "worker/index.js"
compatibility_date = "2024-12-01"

# D1 数据库（Wrangler v4 自动解析ID）
[[d1_databases]]
binding = "DB"
database_name = "qinghome-db"

# 静态资源托管（Vite 构建产物）
[assets]
binding = "ASSETS"
directory = "./dist"
not_found_handling = "single-page-application"

# Cron 触发器：每 5 分钟保活，减少冷启动
[triggers]
crons = ["*/5 * * * *"]